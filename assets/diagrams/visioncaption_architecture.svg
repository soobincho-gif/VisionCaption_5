<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#102A43" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#0F766E"/>
    </marker>
    <style>
      .title { font: 700 34px 'Inter', 'Segoe UI', sans-serif; fill: #102A43; }
      .subtitle { font: 500 17px 'Inter', 'Segoe UI', sans-serif; fill: #486581; }
      .box-title { font: 700 22px 'Inter', 'Segoe UI', sans-serif; fill: #102A43; }
      .box-copy { font: 500 16px 'Inter', 'Segoe UI', sans-serif; fill: #486581; }
      .chip { font: 700 13px 'Inter', 'Segoe UI', sans-serif; fill: #0F766E; }
      .small { font: 600 14px 'Inter', 'Segoe UI', sans-serif; fill: #486581; }
    </style>
  </defs>

  <rect width="1280" height="760" rx="32" fill="url(#bg)"/>
  <text x="70" y="78" class="title">VisionCaption Architecture</text>
  <text x="70" y="110" class="subtitle">Frozen artifact replay for explainable prompt-fidelity image retrieval</text>

  <rect x="70" y="160" width="250" height="126" rx="24" fill="url(#card)" stroke="#D9E2EC" filter="url(#shadow)"/>
  <text x="98" y="205" class="box-title">1. User Input</text>
  <text x="98" y="238" class="box-copy">Free-text query, benchmark quick-fill,</text>
  <text x="98" y="262" class="box-copy">and optional session-only image upload.</text>

  <rect x="375" y="160" width="250" height="126" rx="24" fill="url(#card)" stroke="#D9E2EC" filter="url(#shadow)"/>
  <text x="403" y="205" class="box-title">2. Artifact Loader</text>
  <text x="403" y="238" class="box-copy">Trusted JSON and JSONL artifacts are</text>
  <text x="403" y="262" class="box-copy">loaded into portable repo-safe paths.</text>

  <rect x="680" y="160" width="250" height="126" rx="24" fill="url(#card)" stroke="#D9E2EC" filter="url(#shadow)"/>
  <text x="708" y="205" class="box-title">3. Candidate Retrieval</text>
  <text x="708" y="238" class="box-copy">Similarity ranking compares the query</text>
  <text x="708" y="262" class="box-copy">against the frozen embedding gallery.</text>

  <rect x="985" y="160" width="225" height="126" rx="24" fill="url(#card)" stroke="#D9E2EC" filter="url(#shadow)"/>
  <text x="1013" y="205" class="box-title">4. Rerank</text>
  <text x="1013" y="238" class="box-copy">Top-3 ordering is refined with</text>
  <text x="1013" y="262" class="box-copy">deterministic feature contributions.</text>

  <rect x="130" y="420" width="280" height="152" rx="24" fill="url(#card)" stroke="#D9E2EC" filter="url(#shadow)"/>
  <text x="158" y="465" class="box-title">Optional Upload Path</text>
  <text x="158" y="498" class="box-copy">If an API key is configured, a temporary</text>
  <text x="158" y="522" class="box-copy">caption and embedding are generated for</text>
  <text x="158" y="546" class="box-copy">session-only comparison with the gallery.</text>

  <rect x="500" y="400" width="320" height="192" rx="24" fill="url(#card)" stroke="#D9E2EC" filter="url(#shadow)"/>
  <text x="528" y="445" class="box-title">Deterministic Rerank Features</text>
  <text x="528" y="478" class="box-copy">Visible text overlap</text>
  <text x="528" y="504" class="box-copy">Named entity match</text>
  <text x="528" y="530" class="box-copy">Label-value phrase overlap</text>
  <text x="528" y="556" class="box-copy">Component cue overlap</text>
  <text x="528" y="582" class="box-copy">Question paraphrase overlap</text>

  <rect x="910" y="400" width="300" height="192" rx="24" fill="url(#card)" stroke="#D9E2EC" filter="url(#shadow)"/>
  <text x="938" y="445" class="box-title">Output Surfaces</text>
  <text x="938" y="478" class="box-copy">Live Demo top-1 explanation</text>
  <text x="938" y="504" class="box-copy">Top-3 result cards</text>
  <text x="938" y="530" class="box-copy">Before/after benchmark traces</text>
  <text x="938" y="556" class="box-copy">Feature tables and raw logs</text>
  <text x="938" y="582" class="box-copy">Promotion metrics and architecture view</text>

  <path d="M320 223H372" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M625 223H677" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M930 223H982" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1098 286V374" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M660 286V394" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M270 286V414" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M410 496H496" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M820 496H906" stroke="#0F766E" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="70" y="650" width="192" height="38" rx="19" fill="#DCFCE7"/>
  <text x="101" y="675" class="chip">Frozen replay is default</text>
  <rect x="282" y="650" width="264" height="38" rx="19" fill="#DBEAFE"/>
  <text x="312" y="675" class="chip">Upload path is session-only</text>
  <rect x="566" y="650" width="280" height="38" rx="19" fill="#FEF3C7"/>
  <text x="596" y="675" class="chip">Rerank is explicit and inspectable</text>
  <rect x="866" y="650" width="292" height="38" rx="19" fill="#E0F2FE"/>
  <text x="896" y="675" class="chip">Outputs stay benchmark-traceable</text>
</svg>
